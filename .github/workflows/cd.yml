name: Continuous Deployment (CD)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running manual deployment'
        required: false
        default: 'Manual deployment'

jobs:
  cd-pipeline:
    name: CD Infrastructure & Application Deployment
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3. Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Terraform Setup
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # 5. Terraform Init
      - name: Terraform Init
        run: |
          cd terraform/env/dev
          terraform init

      # 6. Terraform Plan
      - name: Terraform Plan
        run: |
          cd terraform/env/dev
          terraform plan -out=tfplan

      # 7. Terraform Apply (Infrastructure Provisioning)
      - name: Terraform Apply
        run: |
          cd terraform/env/dev
          terraform apply -auto-approve tfplan

      # 8. Build, Tag, and Push Image to Amazon ECR
      - name: Build and Push Docker Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: dev-app-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 9. Deploy New Image to ECS & Wait for Service Stability
      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service \
            --cluster dev-ecs-cluster \
            --service dev-service \
            --force-new-deployment

      - name: Wait for ECS Service Stability
        run: |
          aws ecs wait services-stable \
            --cluster dev-ecs-cluster \
            --services dev-service

      # 10. Health Check
      - name: ALB Health Check
        run: |
          cd terraform/env/dev
          ALB_DNS=$(terraform output -raw alb_dns_endpoint)
          echo "Testing health endpoint at http://${ALB_DNS}/"
          
          # Retry loop for target group stabilization
          for i in {1..10}; do
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" "http://${ALB_DNS}/" || true)
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Health check passed with HTTP 200!"
              exit 0
            fi
            echo "Waiting for ALB health check... status code: $HTTP_STATUS"
            sleep 15
          done

          echo "Health check failed!"
          exit 1